name: Update JP sector data

# 日本業種別の日次バッチ（jp-sector-dashboard-spec.md §6）。東証33業種＋TOPIX-17。
# J-Quants は当日大引け後 16:30 JST 頃にデータ更新（公式情報）。
# その約30分後、当日 17:00 JST に実行する。米国版（米国引け後の早朝）とは別タイミング。
# TOPIX-17 は対応 ETF（NEXT FUNDS）を yfinance で取得（東証引け後で確定済み）。
on:
  schedule:
    # 08:00 UTC = 当日 17:00 JST（J-Quants 16:30 更新の約30分後）。
    # 東証の立会日（月〜金）に合わせて Mon-Fri。JST と UTC の曜日は同日（08:00 UTC）。
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data-jp
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - name: Generate jp_sectors.json (J-Quants)
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python pipeline/src/build_jp.py --source jquants
      - name: Generate topix17.json (TOPIX-17・NEXT FUNDS ETF, yfinance → stooq)
        run: python pipeline/src/build_topix17.py --source auto
      - name: Commit if changed
        run: |
          git config user.name  "market-dashboard-bot"
          git config user.email "actions@github.com"
          git add web/public/data/jp_sectors.json web/public/data/topix17.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore(data): refresh JP sector performance $(date -u +%F)"
            git push
          fi

      # ---- X（Twitter）自動投稿: TOPIX-17 業種別 1D パフォーマンス ----
      # データ更新直後に topix17.json から 1D 降順のランキング画像を作って投稿する。
      # 認証情報（Secrets）未設定なら投稿はスキップされ、バッチは失敗しない。
      - name: 日本語フォント（X投稿画像の日本語描画用）
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Playwright chromium
        run: python -m playwright install --with-deps chromium
      - name: X（Twitter）へTOPIX-17の1Dパフォーマンスを投稿
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://dashboard.markets-lab.com/' }}
        run: python pipeline/src/post_to_x.py --variant topix17
      - name: Commit X post state (TOPIX-17)
        run: |
          git config user.name  "market-dashboard-bot"
          git config user.email "actions@github.com"
          git add web/public/data/x_last_posted.json
          if git diff --staged --quiet; then
            echo "No X post-state change."
          else
            git commit -m "chore(x): record TOPIX-17 1D post state $(date -u +%F)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push retry $i"; sleep 3
            done
          fi
