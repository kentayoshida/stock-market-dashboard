name: Update market data

# 日次バッチ（market-dashboard-spec.md §1-6, §5）。
# 米国市場引け後（JST 早朝）に yfinance で価格取得 → latest.json 再生成 →
# 変更をコミット。Vercel が commit を検知して静的再デプロイする。
on:
  schedule:
    # 06:10 JST = 21:10 UTC（米国市場引け〜データ確定後）。
    - cron: "10 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Generate latest.json (US, yfinance → stooq fallback)
        run: python pipeline/src/build.py --source auto --config pipeline/etfs.yaml --out web/public/data/latest.json

      - name: Generate global.json (世界 Global・地域別)
        run: python pipeline/src/build_global.py --source auto

      - name: Commit if changed
        run: |
          git config user.name  "market-dashboard-bot"
          git config user.email "actions@github.com"
          git add web/public/data/latest.json web/public/data/global.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore(data): refresh market performance $(date -u +%F)"
            git push
          fi
