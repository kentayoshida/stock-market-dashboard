name: Update market data

# 日次バッチ（market-dashboard-spec.md §1-6, §5）。米国株・世界各国ETF。
# 米国市場引け後（JST 早朝）に yfinance で価格取得 → latest.json / global.json 再生成 →
# 変更をコミット。Vercel が commit を検知して静的再デプロイする。
on:
  schedule:
    # 21:05 UTC = 06:05 JST。米国引けは冬時間(EST)で 21:00 UTC（=06:00 JST）。
    # cron は UTC 固定なので、この冬時間の引け＋確定待ちに合わせて 06:00 JST 以降とする。
    # （夏時間 EDT の引けは 20:00 UTC=05:00 JST 相当で、こちらは十分に確定後。）
    # ※ これ以上早めると冬場に引け前へ回り込み前日データを取得するため、実質の下限。
    - cron: "5 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Generate latest.json (US, yfinance → stooq fallback)
        run: python pipeline/src/build.py --source auto --config pipeline/etfs.yaml --out web/public/data/latest.json

      - name: Generate global.json (世界 Global・地域別)
        run: python pipeline/src/build_global.py --source auto

      - name: Generate dow30.json (ダウ工業株30種・構成銘柄)
        run: python pipeline/src/build_dow30.py --source auto --config pipeline/dow30.yaml --out web/public/data/dow30.json

      - name: Commit if changed
        run: |
          git config user.name  "market-dashboard-bot"
          git config user.email "actions@github.com"
          git add web/public/data/latest.json web/public/data/global.json web/public/data/dow30.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore(data): refresh market performance $(date -u +%F)"
            git push
          fi

      # ---- X（Twitter）自動投稿: 米国 1D パフォーマンス（指数ETF＋S&P500セクターETF） ----
      # データ更新直後に latest.json から 1D 降順のランキング画像を作って投稿する。
      # 認証情報（Secrets）未設定なら投稿はスキップされ、バッチは失敗しない。
      - name: 日本語フォント（X投稿画像の日本語描画用）
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Playwright chromium
        run: python -m playwright install --with-deps chromium
      - name: X（Twitter）へ米国1Dパフォーマンスを投稿
        continue-on-error: true
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://dashboard.markets-lab.com/' }}
        run: python pipeline/src/post_to_x.py --variant us --layout 2panel
      - name: Commit X post state (米国)
        run: |
          git config user.name  "market-dashboard-bot"
          git config user.email "actions@github.com"
          git add web/public/data/x_last_posted.json
          if git diff --staged --quiet; then
            echo "No X post-state change."
          else
            git commit -m "chore(x): record US 1D post state $(date -u +%F)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "push retry $i"; sleep 3
            done
          fi
