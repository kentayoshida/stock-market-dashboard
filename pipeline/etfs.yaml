# ETF マッピング定義 — コード非依存で銘柄を追加/差替できる（Ken が調整可能）。
# すべて米国上場・ドル建てで統一（market-dashboard-spec.md §1-5, §2）。
#
# Phase 1 スコープ: 主要米国株価指数ブロック（§2.1）のみ、期間 1D/1M/1Y。
# Phase 2 以降で §2.2〜2.6 のブロックと全期間トグルを追加する。

# 期間トグルで出す期間（build.py がこの順序で算出する）。
# Phase 1 は 1D/1M/1Y のみ。Phase 2 で [1D, 1W, 1M, 3M, 6M, YTD, 1Y] に拡張。
periods: [1D, 1M, 1Y]

# 配当込み（トータルリターン, Adj Close）トグルを出す期間（§3.2）。1Y のみ。
total_return_periods: [1Y]

