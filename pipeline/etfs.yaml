# ETF マッピング定義 — コード非依存で銘柄を追加/差替できる（Ken が調整可能）。
# すべて米国上場・ドル建てで統一（market-dashboard-spec.md §1-5, §2）。
#
# Phase 2: 全期間トグル（1D〜1Y）＋全ブロック（§2.1〜2.6）。
# 「review: true」= 代表ETFの選定に幅がある「要確認」銘柄（§2 の印）。暫定ティッカーを
# 置きつつフラグで明示し、CI 検証（validate-tickers.yml）で候補を出して Ken が最終決定する。

periods: [1D, 1W, 1M, 3M, 6M, YTD, 1Y]
total_return_periods: [1Y]   # 配当込み(Adj Close)トグルを出す期間（1Y のみ・§3.2）

blocks:
  # ---- §2.1 主要米国株価指数 ETF ----
  - id: us_index
    title: 主要米国株価指数 ETF
    items:
      - { label: ダウ平均,          ticker: DIA }
      - { label: S&P500,            ticker: SPY }
      - { label: ナスダック100,      ticker: QQQ }
      - { label: コアS&P中型株,      ticker: IJH }
      - { label: コアS&P小型株,      ticker: IJR }
      - { label: ラッセル1000,       ticker: IWB }
      - { label: ラッセル2000,       ticker: IWM }
      - { label: ラッセル3000,       ticker: IWV }
      - { label: S&P500グロース,     ticker: IVW }
      - { label: 中型株400グロース,   ticker: IJK }
      - { label: 小型株600グロース,   ticker: IJT }
      - { label: S&P500バリュー,     ticker: IVE }
      - { label: 中型株400バリュー,   ticker: IJJ }
      - { label: 小型株600バリュー,   ticker: IJS }
      - { label: ダウ配当株100,      ticker: SCHD }   # Dow Jones U.S. Dividend 100（確定）
      - { label: S&P均等ウェイト,     ticker: RSP }

  # ---- §2.2 S&P500 セクター ETF（SPDR Select Sector）----
  - id: sectors
    title: S&P500 セクター ETF
    items:
      - { label: 一般消費財,   ticker: XLY }
      - { label: 生活必需品,   ticker: XLP }
      - { label: エネルギー,   ticker: XLE }
      - { label: 金融,        ticker: XLF }
      - { label: ヘルスケア,   ticker: XLV }
      - { label: 工業,        ticker: XLI }
      - { label: 素材,        ticker: XLB }
      - { label: テクノロジー, ticker: XLK }
      - { label: 通信サービス, ticker: XLC }
      - { label: 公益,        ticker: XLU }
      - { label: 不動産,      ticker: XLRE }

  # ---- §2.3 主要国株式 ETF（iShares MSCI 単一国シリーズ）----
  - id: countries
    title: 主要国株式 ETF
    items:
      - { label: 豪州,     ticker: EWA }
      - { label: ブラジル,  ticker: EWZ }
      - { label: カナダ,    ticker: EWC }
      - { label: 中国,      ticker: MCHI }   # 確定（広範・本土含む）。代替 FXI(大型50)
      - { label: フランス,  ticker: EWQ }
      - { label: ドイツ,    ticker: EWG }
      - { label: 香港,      ticker: EWH }
      - { label: インド,    ticker: INDA }
      - { label: イタリア,  ticker: EWI }
      - { label: 日本,      ticker: EWJ }
      - { label: メキシコ,  ticker: EWW }
      - { label: スペイン,  ticker: EWP }
      - { label: 南アフリカ, ticker: EZA }
      - { label: 英国,      ticker: EWU }
      - { label: 中東,      ticker: MES, review: true }   # GULF は取得不可 → MES(中東広域)を採用・要検証
      - { label: 新興国,    ticker: EEM }   # 確定（高流動）。代替 IEMG(低コスト)

  # ---- §2.4 コモディティ ETF ----
  - id: commodities
    title: コモディティ ETF
    items:
      - { label: コモディティ全般, ticker: DBC }  # 確定。代替 PDBC(K-1回避)
      - { label: エネルギー,      ticker: DBE }
      - { label: 天然ガス,        ticker: UNG }
      - { label: ゴールド,        ticker: GLD }
      - { label: シルバー,        ticker: SLV }
      - { label: ベースメタル,     ticker: DBB }
      - { label: 農産物,          ticker: DBA }

  # ---- §2.5 債券 ETF ----
  - id: bonds
    title: 債券 ETF
    items:
      - { label: 短期債,      ticker: SHY }   # 1-3年米国債
      - { label: 中期債,      ticker: IEF }   # 7-10年米国債
      - { label: 20年超債券,   ticker: TLT }
      - { label: 債券合計,     ticker: AGG }   # 米国総合債券（BND と重複のため AGG に一本化）
      - { label: TIPS,       ticker: TIP }   # 物価連動債
      - { label: ハイイールド債, ticker: HYG }

  # ---- §2.6 その他 ETF ----
  - id: others
    title: その他 ETF
    items:
      - { label: 半導体株, ticker: SOXX }  # 確定。代替 SMH
      - { label: 金鉱山株, ticker: GDX }
      - { label: 銀鉱山株, ticker: SIL }
