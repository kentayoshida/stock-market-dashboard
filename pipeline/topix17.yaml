# TOPIX-17 業種別ダッシュボード（/topix17）。
# 33業種（J-Quants 指数）とは異なり、対応する上場 ETF（野村アセットマネジメント
# NEXT FUNDS シリーズ）の価格を利用する。取得は yfinance（"1617.T" 形式）。
# build_topix17.py が処理して topix17.json を出力する。
#
# 各業種名リンクは JPX「東証マネー部！」 https://money-bu-jpx.com/search/<code>/ 。
# <code> は ETF の 4 桁銘柄コード（下表 code）。
# ※ ETF 価格ベースのため配当は含まない近似（連動対象は配当込み TOPIX-17 サブ指数）。
# ※ 1615（東証銀行業株価指数 ETF）は TOPIX-17 の 17 業種ではないため含めない。

source: yfinance
# 末尾 2 キーは期間リターンではなく 52 週レンジ指標（トグル右端に表示）。
periods: [1D, 1W, 1M, 3M, 6M, YTD, 1Y, DD_52WH, UP_52WL]
total_return_periods: [1Y]   # ETF の Adj Close ベース（配当込み近似）。表示は price 主軸。

sort:
  default: code_order        # code_order（コード順） | return_desc（選択期間リターン降順）

# ---- 主要指数（業種の上部に表示・日本市況概況）----
# 各 item は取得元を持つ:
#   source: yfinance → symbol（yfinance ティッカー。指数は ^、ETF は 4桁.T）
#   source: jquants  → index_code（J-Quants /indices/bars/daily の指数コード）
# データ取得元の方針（ユーザー承認済み・混在）:
#   - JPX 系のうち市場区分指数（プライム/スタンダード/グロース）は ETF が無いため J-Quants。
#     ⚠ index_code 0500/0501/0502 は暫定。初回 CI 実データで取得可否を確認し、no_data なら修正。
#   - TOPIX は J-Quants 0000（既知・33業種 0040〜と同系統）。
#   - JPX日経400 / グロース250 / 東証REIT は対応 NEXT FUNDS ETF を yfinance で取得（本ページの
#     17業種と同じ ETF プロキシ方針）。日経225・日本VI は yfinance の指数シンボル。
# 表示は固定順（並び替えしない）。全行とも「％変化」で単位統一（日本VI も％）。
indices:
  id: jp_indices
  title: 主要指数
  columns: 2                 # UI の表示カラム数（CSS 多段: 先頭8件=左列 / 次8件=右列）
  # 並び順＝画面の左列8件→右列8件。index_code はユーザー提示の JPX 配信対象コード。
  items:
    # --- 左列 ---
    - { label: 日経225,        source: yfinance, symbol: "^N225",    en: "Nikkei 225" }
    - { label: TOPIX,          source: jquants,  index_code: "0000", en: "TOPIX" }
    - { label: TOPIX Core30,   source: jquants,  index_code: "0028", en: "TOPIX Core30" }
    - { label: TOPIX Large70,  source: jquants,  index_code: "0029", en: "TOPIX Large 70" }  # コード未指定→標準0029（CI確認）
    - { label: TOPIX Mid400,   source: jquants,  index_code: "002B", en: "TOPIX Mid400" }
    - { label: TOPIX Small500, source: jquants,  index_code: "002F", en: "TOPIX Small500" }
    - { label: TOPIX バリュー,   source: jquants,  index_code: "8100", en: "TOPIX Value" }
    - { label: TOPIX グロース,   source: jquants,  index_code: "8200", en: "TOPIX Growth" }
    # --- 右列 ---
    - { label: 東証プライム,     source: jquants,  index_code: "0500", en: "TSE Prime" }
    - { label: 東証スタンダード,  source: jquants,  index_code: "0501", en: "TSE Standard" }
    - { label: 東証グロース,     source: jquants,  index_code: "0502", en: "TSE Growth" }
    - { label: JPX日経400,      source: yfinance, symbol: "1592.T",   en: "JPX-Nikkei 400" }  # コード未提示→ETF継続
    - { label: グロース250,      source: jquants,  index_code: "0070", en: "Growth 250" }
    - { label: JASDAQ INDEX,   source: jquants,  index_code: "0091", en: "JASDAQ Index" }
    - { label: 東証REIT,        source: jquants,  index_code: "0075", en: "TSE REIT" }
    - { label: 日本VI,         source: yfinance, symbol: "^NKVI.OS", en: "Nikkei VI" }

block:
  id: topix17
  title: TOPIX-17
  columns: 3                 # UI の表示カラム数
  items:
    - { label: 食品,                     code: "1617" }
    - { label: エネルギー資源,             code: "1618" }
    - { label: 建設・資材,                code: "1619" }
    - { label: 素材・化学,                code: "1620" }
    - { label: 医薬品,                    code: "1621" }
    - { label: 自動車・輸送機,             code: "1622" }
    - { label: 鉄鋼・非鉄,                code: "1623" }
    - { label: 機械,                      code: "1624" }
    - { label: 電機・精密,                code: "1625" }
    - { label: 情報通信・サービスその他,     code: "1626" }
    - { label: 電力・ガス,                code: "1627" }
    - { label: 運輸・物流,                code: "1628" }
    - { label: 商社・卸売,                code: "1629" }
    - { label: 小売,                      code: "1630" }
    - { label: 銀行,                      code: "1631" }
    - { label: 金融（除く銀行）,           code: "1632" }
    - { label: 不動産,                    code: "1633" }
