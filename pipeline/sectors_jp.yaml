# 東証33業種マッピング（jp-sector-dashboard-spec.md §2, §6）。
# コード非依存で調整可能。表示順は業種コード順（JPX ファクトシート準拠）。
#
# index_code = J-Quants /indices/bars/daily の指数コード。
#   ⚠ 重要: 33業種別TOPIX の指数コードは **16進** で 0040〜0060（= 0x40〜0x60・計33）。
#   非 Premium の「東証業種別（価格指数）」を使用（配当込み 6040〜6060 は Premium のため不可）。
#   ※ CI（validate_jp.py）で全コードの取得可否を確認済み。
# sector33_code = 証券コード協議会の33業種区分コード（参考・空売り比率等との突合用）。

source_mode: index_direct    # J-Quants で33業種別TOPIX指数値を直接取得（分岐A・確定）
total_return: false          # 配当込みは Premium のため無効。Premium 契約後に 6040〜6060 で true

sort:
  default: code_order        # code_order（業種コード順） | return_desc（選択期間のリターン降順）

# 末尾 2 キーは期間リターンではなく 52 週レンジ指標（トグル右端に表示）。
periods: [1D, 1W, 1M, 3M, 6M, YTD, 1Y, DD_52WH, UP_52WL]

block:
  id: jp_sectors_33
  title: 東証33業種
  columns: 3                 # UI の表示カラム数
