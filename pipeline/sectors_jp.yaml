# 東証33業種マッピング（jp-sector-dashboard-spec.md §2, §6）。
# コード非依存で調整可能。表示順は業種コード順（JPX ファクトシート準拠）。
#
# index_code = J-Quants /indices/bars/daily の指数コード（33業種別TOPIX の指数値取得に使用）。
#   ⚠ 0040〜0072 は「TOPIX-33業種別」の指数コード候補。CI（validate_jp.py）で各コードの
#     取得可否を検証してから確定する（未確認のものは build 時 no_data＝「データなし」表示）。
# sector33_code = 証券コード協議会の33業種区分コード（参考・空売り比率等との突合用）。

source_mode: index_direct    # J-Quants で33業種別TOPIX指数値を直接取得（分岐A・確定）
total_return: false          # Premium 未契約のため配当込みは無効。Premium 契約後に true

sort:
  default: code_order        # code_order（業種コード順） | return_desc（選択期間のリターン降順）

periods: [1D, 1W, 1M, 3M, 6M, YTD, 1Y]

