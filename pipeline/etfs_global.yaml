# 世界の株式（主要国）ETF マッピング — 別ページ /global（世界 Global）用。
# すべて米国上場・ドル建て。build.py が etfs.yaml と同じ形式で処理して global.json を出力。
#
# 先進国 / 新興国 の2ブロックに分割（MSCI 分類ベース）。
#   ※ 韓国(EWY)・台湾(EWT) は MSCI では新興国。韓国は FTSE では先進国のため、
#     先進国に移したい場合は下のブロック間で行を移動すれば可（コード非依存）。

periods: [1D, 1W, 1M, 3M, 6M, YTD, 1Y]
total_return_periods: [1Y]   # 1Y のみ配当込みトグル（米国版と共通）

blocks:
  # ---- 先進国株式 ----
  - id: developed
    title: 先進国株式 ETF
    items:
      - { label: 日本,      ticker: EWJ }
      - { label: 英国,      ticker: EWU }
      - { label: ドイツ,    ticker: EWG }
      - { label: フランス,  ticker: EWQ }
      - { label: カナダ,    ticker: EWC }
      - { label: 豪州,      ticker: EWA }
      - { label: イタリア,  ticker: EWI }
      - { label: スペイン,  ticker: EWP }
      - { label: 香港,      ticker: EWH }

  # ---- 新興国株式 ----
  - id: emerging
    title: 新興国株式 ETF
    items:
      - { label: 中国,       ticker: MCHI }   # 広範・本土含む。代替 FXI(大型50)
      - { label: インド,     ticker: INDA }
      - { label: 台湾,       ticker: EWT }    # 新規追加（MSCI 新興国）
      - { label: 韓国,       ticker: EWY }    # 新規追加（MSCI 新興国／FTSE では先進国）
      - { label: ブラジル,    ticker: EWZ }
      - { label: メキシコ,    ticker: EWW }
      - { label: 南アフリカ,  ticker: EZA }
      - { label: 新興国(広範), ticker: EEM }   # 新興国全体（高流動）。代替 IEMG
