# 世界の株式（主要国）ETF — 別ページ /global。
# 先進国（上段）／新興国（下段）の2ティア。各ティアを地域別の中項目に分ける。
# 地域の並びは世界地図に対応させ、左→右に Americas → Europe → MEA → Asia Pacific。
# 上下ティアで同じ地域列が縦に揃うため、地域横断で先進国↔新興国を対比できる。
# すべて米国上場・ドル建て。build_global.py が処理して global.json を出力。
#
# lead = ティア全体のブロードETF（先進国=VEA / 新興国=EEM）。
# 一部は流動性の薄いフロンティア系（KWT 等）を含む。取得不可なら「データなし」表示。
# ※ NGE(ナイジェリア)・PAK(パキスタン) は 2025 年に上場廃止・償還されたため除外。

periods: [1D, 1W, 1M, 3M, 6M, YTD, 1Y]
total_return_periods: [1Y]

# 地域列の表示順（左→右）と表示ラベル
region_order: [americas, europe, mea, apac]
region_labels:
  americas: Americas
  europe: Europe
  mea: Middle East & Africa
  apac: Asia Pacific

tiers:
  # ===== 先進国株式（上段） =====
  - id: developed
    title: 先進国株式 ETF
    lead: { label: 先進国（除く米国）, ticker: VEA }
    groups:
      americas:
        - { label: カナダ, ticker: EWC }
      europe:
        - { label: ヨーロッパ, ticker: VGK }
        - { label: 英国, ticker: EWU }
        - { label: ドイツ, ticker: EWG }
        - { label: フランス, ticker: EWQ }
        - { label: イタリア, ticker: EWI }
        - { label: スペイン, ticker: EWP }
        - { label: スイス, ticker: EWL }
        - { label: オランダ, ticker: EWN }
        - { label: ベルギー, ticker: EWK }
        - { label: ノルウェー, ticker: ENOR }
        - { label: スウェーデン, ticker: EWD }
        - { label: フィンランド, ticker: EFNL }
        - { label: デンマーク, ticker: EDEN }
        - { label: オーストリア, ticker: EWO }
        - { label: アイルランド, ticker: EIRL }
      mea:
        - { label: イスラエル, ticker: EIS }
      apac:
        - { label: 日本, ticker: EWJ }
        - { label: 香港, ticker: EWH }
        - { label: シンガポール, ticker: EWS }
        - { label: 豪州, ticker: EWA }
        - { label: ニュージーランド, ticker: ENZL }

  # ===== 新興国株式（下段） =====
  - id: emerging
    title: 新興国株式 ETF
    lead: { label: 新興国, ticker: EEM }
    groups:
      americas:
        - { label: メキシコ, ticker: EWW }
        - { label: ラテンアメリカ, ticker: ILF }
        - { label: ブラジル, ticker: EWZ }
        - { label: アルゼンチン, ticker: ARGT }
        - { label: チリ, ticker: ECH }
        - { label: ペルー, ticker: EPU }
      europe:
        - { label: ポーランド, ticker: EPOL }
        - { label: トルコ, ticker: TUR }
      mea:
        - { label: UAE, ticker: UAE }
        - { label: カタール, ticker: QAT }
        - { label: クウェート, ticker: KWT }
        - { label: アフリカ, ticker: AFK }
        - { label: 南アフリカ, ticker: EZA }
      apac:
        - { label: アジア新興国, ticker: EEMA }
        - { label: 韓国, ticker: EWY }
        - { label: 台湾, ticker: EWT }
        - { label: 中国, ticker: MCHI }
        - { label: 中国（大型株）, ticker: FXI }
        - { label: タイ, ticker: THD }
        - { label: マレーシア, ticker: EWM }
        - { label: ベトナム, ticker: VNM }
        - { label: フィリピン, ticker: EPHE }
        - { label: インドネシア, ticker: EIDO }
        - { label: インド, ticker: INDA }
